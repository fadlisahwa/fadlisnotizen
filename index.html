<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fadlis Notizen</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #f5f3ef; color: #333; }
    header { text-align: center; padding: 60px 20px; font-family: 'Playfair Display', serif; }
    header h1 { font-size: 42px; margin: 0; }
    header p { color: #777; margin-top: 10px; }
    .container { max-width: 800px; margin: auto; padding: 20px; }
    .post { background: white; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
    .post:hover { transform: translateY(-5px); }
    .post h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
    .date { font-size: 12px; color: #aaa; margin-bottom: 15px; }
    footer { text-align: center; padding: 40px 20px; color: #888; }
    button { display: block; margin: 10px 0; padding: 10px 16px; border: none; background: black; color: white; border-radius: 8px; cursor: pointer; }
    textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; font-family: 'Poppins'; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>Fadlis Notizen</h1>
  <p>Ein Ort für meine Gedanken und Geschichten ✨</p>
</header>

<div class="container">

  <!-- 🔐 LOGIN BUTTON -->
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <input type="text" id="title" placeholder="Titel des Beitrags...">
  <textarea id="content" placeholder="Schreibe hier etwas..."></textarea>
  <button onclick="addPost()">Veröffentlichen</button>

  <div id="posts"></div>

</div>

<footer>
  © 2026 - Mit ästhetischen Vibes erstellt ☕
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjZ3DwJrOE2CBaWr2MkxyJ90MMo1sm3jk",
    authDomain: "fadli-blog.firebaseapp.com",
    projectId: "fadli-blog",
    storageBucket: "fadli-blog.firebasestorage.app",
    messagingSenderId: "1080969131334",
    appId: "1:1080969131334:web:2ad03ee8c8f240fe62e147",
    measurementId: "G-XJ6QYG77XY"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔐 AUTH
  const auth = getAuth();
  const provider = new GoogleAuthProvider();
  let currentUser = null;

  const ADMIN_EMAIL = "fadlisahwa.deutschland@gmail.com";

  window.login = async function() {
    const result = await signInWithPopup(auth, provider);
    currentUser = result.user;
  }

  window.logout = async function() {
    await signOut(auth);
    currentUser = null;
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      console.log("Login sebagai:", user.email);
    }
  });

  // 🔒 POST PROTECTION
  window.addPost = async function() {

    if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
      alert("Nur du kannst schreiben!");
      return;
    }

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (!title || !content) {
      alert("Bitte zuerst ausfüllen!");
      return;
    }

    await addDoc(collection(db, "posts"), {
      title,
      content,
      date: new Date().toLocaleDateString()
    });

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    loadPosts();
  }

  async function loadPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "posts"));

    querySnapshot.forEach((docData) => {
      const data = docData.data();

      const post = document.createElement("div");
      post.classList.add("post");

      post.innerHTML = `
        <h2>${data.title}</h2>
        <div class="date">${data.date}</div>
        <p>${data.content}</p>
        <button onclick="deletePost('${docData.id}')">Löschen</button>
      `;

      container.appendChild(post);
    });
  }

  window.deletePost = async function(id) {
    if (!currentUser || currentUser.email !== ADMIN_EMAIL) {
      alert("Keine Berechtigung!");
      return;
    }

    await deleteDoc(doc(db, "posts", id));
    loadPosts();
  }

  loadPosts();
</script>

</body>
</html>
